server {
    listen 80;
    listen [::]:80;
    server_name day1.bluechocalate.localhost.cc;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name day1.bluechocalate.localhost.cc;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/day1.bluechocalate.localhost.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/day1.bluechocalate.localhost.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_read_timeout 30s;
    }
}
